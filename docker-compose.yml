services:
  db:
    build:
      context: ./persistence
      dockerfile: docker/Dockerfile
    container_name: echo-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: echo-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ECHO_JWT_SECRET: ${ECHO_JWT_SECRET}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
      SERVER_SSL_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: echo-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8083}:80"
    restart: unless-stopped

  admin-init:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: echo-admin-init
    profiles:
      - tools
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ECHO_JWT_SECRET: ${ECHO_JWT_SECRET}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD_HASH: ${APP_ADMIN_PASSWORD_HASH:-}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
    command: [
      "java",
      "-jar",
      "app.jar",
      "--spring.main.web-application-type=none",
      "--app.admin.bootstrap.enabled=true"
    ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
