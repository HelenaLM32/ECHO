services:
  db:
    build:
      context: ./persistence
      dockerfile: docker/Dockerfile
    container_name: echo-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: echo-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ECHO_JWT_SECRET: ${ECHO_JWT_SECRET}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN}
      SERVER_SSL_ENABLED: ${SERVER_SSL_ENABLED:-false}
      SSL_KEYSTORE_PATH: ${SSL_KEYSTORE_PATH:-}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:-}
      APP_UPLOAD_DIR: /app/uploads
      APP_BASE_URL: http://${TRAEFIK_HOST}:${FRONTEND_PORT}
      APP_UPLOAD_MAX_FILE_SIZE_BYTES: ${APP_UPLOAD_MAX_FILE_SIZE_BYTES}
      APP_UPLOAD_MAX_FILE_SIZE: ${APP_UPLOAD_MAX_FILE_SIZE}
      APP_UPLOAD_MAX_REQUEST_SIZE: ${APP_UPLOAD_MAX_REQUEST_SIZE}
      APP_UPLOAD_MAX_SWALLOW_SIZE: ${APP_UPLOAD_MAX_SWALLOW_SIZE}
      APP_UPLOAD_ALLOWED_CONTENT_TYPES: ${APP_UPLOAD_ALLOWED_CONTENT_TYPES}
      APP_UPLOAD_ALLOWED_SUBDIRS: ${APP_UPLOAD_ALLOWED_SUBDIRS}
      APP_SHOW_SQL: ${APP_SHOW_SQL:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8084}:8082"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_REDIRECT_URI: ${VITE_REDIRECT_URI:-}
    container_name: echo-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8083}:80"
    labels:
      - "traefik.enable=true"
      # cambiar el echo-fpnuria.net
      - "traefik.http.routers.echo.rule=Host(`${TRAEFIK_HOST:-echo.fpnuria.net}`)"
      - "traefik.http.services.echo.loadbalancer.server.port=80"
    networks:
      - internal
      - proxy
    restart: unless-stopped

  admin-init:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: echo-admin-init
    profiles:
      - tools
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ECHO_JWT_SECRET: ${ECHO_JWT_SECRET}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD_HASH: ${APP_ADMIN_PASSWORD_HASH:-}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-}
      APP_UPLOAD_DIR: /app/uploads
    command: [
      "java",
      "-jar",
      "app.jar",
      "--spring.main.web-application-type=none",
      "--app.admin.bootstrap.enabled=true"
    ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
  proxy:
    external: true
    name: proxy
