spring.application.name=echo
server.port=8082
server.servlet.context-path=/api
spring.datasource.url=jdbc:mysql://localhost:3306/echo
spring.datasource.username=echo_admin
spring.datasource.password=loizhe2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.upload.dir=${APP_UPLOAD_DIR:../uploads}
app.base-url=${APP_BASE_URL:http://localhost:8082}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:}


# permite a la app subir archivos mas grandes (200mb, se podra subir mas!!!)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-swallow-size=209715200
