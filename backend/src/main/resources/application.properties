spring.application.name=echo
server.port=8082
server.servlet.context-path=/api
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/echo}
spring.datasource.username=${DB_USERNAME:echo_admin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${APP_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.upload.dir=${APP_UPLOAD_DIR:../uploads}
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.upload.max-file-size-bytes=${APP_UPLOAD_MAX_FILE_SIZE_BYTES:26214400}
app.upload.allowed-content-types=${APP_UPLOAD_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif,video/mp4,audio/mpeg,audio/wav,audio/webm,application/pdf}
app.upload.allowed-subdirs=${APP_UPLOAD_ALLOWED_SUBDIRS:images,avatars,banners,events,venues,audio,video}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:}

spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:200MB}
server.tomcat.max-swallow-size=${APP_UPLOAD_MAX_SWALLOW_SIZE:31457280}
