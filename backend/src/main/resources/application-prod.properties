app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:http://10.0.3.250,https://10.0.3.250}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:mysql://db:3306/echo}
spring.datasource.username=${DB_USERNAME:echo_admin}
